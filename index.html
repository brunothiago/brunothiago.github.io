<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thiago Bruno</title>
  <meta name="description" content="Desenvolvedor de software. Hub de projetos publicados.">
  <meta property="og:title" content="Thiago Bruno">
  <meta property="og:description" content="Desenvolvedor de software. Hub de projetos.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080d1a;
      --surface: #0e1627;
      --blue:    #003DA5;
      --red:     #C8102E;
      --white:   #eef2ff;
      --gray:    #7a869a;
      --border:  rgba(0, 61, 165, 0.22);
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    /* ── Hero ── */
    .monogram {
      font-size: 3.8rem;
      font-weight: 700;
      color: var(--red);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .name {
      margin-top: 0.55rem;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--white);
      font-family: 'Courier New', 'Menlo', monospace;
    }
    .name-eq {
      color: var(--red);
      margin: 0 0.4em;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 0.25rem;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 2.2rem 0;
      position: relative;
    }
    .divider::after {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 2.5rem;
      height: 1px;
      background: var(--red);
    }

    /* ── Accordion ── */
    .acc-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: none;
      border: none;
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0 0 1rem 0;
      transition: color 0.2s;
    }
    .acc-trigger:hover { color: var(--red); }

    .chevron {
      width: 14px;
      height: 14px;
      stroke: var(--gray);
      fill: none;
      stroke-width: 1.8;
      transition: transform 0.35s ease, stroke 0.2s;
      flex-shrink: 0;
    }
    .acc-trigger:hover .chevron { stroke: var(--red); }
    .acc-trigger[aria-expanded="true"] .chevron { transform: rotate(180deg); }

    .acc-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.45s ease;
    }
    .acc-panel.open { max-height: 1000px; }

    /* ── Project list ── */
    .project-list { list-style: none; }

    .project-item { border-bottom: 1px solid var(--border); }
    .project-item:last-child { border-bottom: none; }

    .project-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 0;
      text-decoration: none;
      color: inherit;
    }
    .project-link:hover .project-name { color: var(--red); }
    .project-link:hover .p-arrow { color: var(--red); }

    .project-body { flex: 1; min-width: 0; }

    .project-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--white);
      transition: color 0.2s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-desc {
      margin-top: 0.2rem;
      font-size: 0.72rem;
      color: var(--gray);
      line-height: 1.45;
    }

    .p-arrow {
      font-size: 0.9rem;
      color: var(--gray);
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .status-msg {
      font-size: 0.72rem;
      color: var(--gray);
      letter-spacing: 0.06em;
      padding: 0.6rem 0 1rem;
    }

    /* ── Social ── */
    .social {
      display: flex;
      gap: 1.4rem;
      align-items: center;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray);
      text-decoration: none;
      transition: color 0.2s;
    }
    .social-link:hover { color: var(--red); }
    .social-link svg { width: 17px; height: 17px; }

    /* ── Arrow hint ── */
    .arrow-hint {
      display: flex;
      justify-content: center;
      margin: -0.8rem 0 1.6rem;
    }
    .arrow-hint svg {
      width: 22px;
      height: 22px;
      color: var(--red);
      animation: bounce 1.8s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0);    opacity: 0.5; }
      50%       { transform: translateY(6px);  opacity: 1;   }
    }

    @media (max-width: 380px) {
      .monogram { font-size: 3rem; }
      .name     { font-size: 0.9rem; }
      .social   { gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="monogram">THB</div>
      <div class="name">thiagobruno<span class="name-eq">=</span>thiagoazevedo</div>
      <div class="subtitle">ENG-TECH-AIE-MCID-FORTAL</div>
    </header>

    <div class="divider"></div>

    <div class="arrow-hint" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
    </div>

    <section aria-label="Projetos">
      <button class="acc-trigger" id="acc-btn" aria-expanded="false" aria-controls="acc-panel">
        Projetos
        <svg class="chevron" viewBox="0 0 16 16">
          <path d="M3.5 6l4.5 4.5 4.5-4.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="acc-panel" id="acc-panel" role="region" aria-labelledby="acc-btn">
        <ul class="project-list" id="project-list">
          <li class="status-msg">Carregando…</li>
        </ul>
      </div>
    </section>

    <div class="divider"></div>

    <nav aria-label="Links sociais" class="social">

      <!-- Telegram -->
      <a class="social-link" href="https://t.me/thiagobruno" target="_blank" rel="noopener noreferrer" title="Telegram @thiagobruno">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-2.04 9.613c-.15.67-.55.834-1.114.519l-3.083-2.27-1.487 1.43c-.165.165-.303.303-.621.303l.222-3.133 5.714-5.162c.249-.22-.054-.342-.384-.122L7.232 14.33l-3.044-.951c-.661-.207-.674-.661.14-.978l11.891-4.583c.55-.198 1.032.135 1.01.913-.001-.001-.001 0 0 0-.016-.083-.016-.083 0 0z"/>
        </svg>
      </a>

      <!-- Instagram -->
      <a class="social-link" href="https://instagram.com/thiagobruno" target="_blank" rel="noopener noreferrer" title="Instagram @thiagobruno">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
        </svg>
      </a>

      <!-- LinkedIn -->
      <a class="social-link" href="https://www.linkedin.com/in/thiago-azevedo-512244212/" target="_blank" rel="noopener noreferrer" title="LinkedIn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>

      <!-- Email profissional -->
      <a class="social-link" href="mailto:thiago.azevedo@cidades.gov.br" title="Email profissional — thiago.azevedo@cidades.gov.br">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
      </a>

      <!-- Email pessoal -->
      <a class="social-link" href="mailto:thiagobruno@me.com" title="Email pessoal — thiagobruno@me.com">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M16 12a4 4 0 010 4.243A5.657 5.657 0 0112 17.657a8 8 0 110-11.314 5.657 5.657 0 014.243 4.314"/>
        </svg>
      </a>

    </nav>
  </div>

  <script>
    const btn   = document.getElementById('acc-btn');
    const panel = document.getElementById('acc-panel');
    const list  = document.getElementById('project-list');

    btn.addEventListener('click', () => {
      const open = panel.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
    });

    fetch('https://api.github.com/users/brunothiago/repos?per_page=100&sort=updated')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(repos => {
        const items = repos
          .filter(r => !r.fork && r.description)
          .slice(0, 15);

        if (!items.length) {
          list.innerHTML = '<li class="status-msg">Nenhum projeto disponível.</li>';
          return;
        }

        list.innerHTML = items.map(r => `
          <li class="project-item">
            <a class="project-link" href="${r.html_url}" target="_blank" rel="noopener noreferrer">
              <div class="project-body">
                <div class="project-name">${r.name}</div>
                <div class="project-desc">${r.description}</div>
              </div>
              <span class="p-arrow" aria-hidden="true">→</span>
            </a>
          </li>`).join('');
      })
      .catch(() => {
        list.innerHTML = '<li class="status-msg">Projetos indisponíveis no momento.</li>';
      });
  </script>
</body>
</html>
